<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Kare Kya? 📞</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a14;
      --surface: #11111e;
      --surface2: #181828;
      --border: rgba(255, 255, 255, 0.07);
      --text: #f0f0fa;
      --muted: #5a5a88;
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.1);
      --green-glow: rgba(34, 197, 94, 0.4);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.1);
      --red-glow: rgba(239, 68, 68, 0.4);
      --yellow: #f59e0b;
    }

    html,
    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ambient blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      transition: background 1s;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      top: -200px;
      left: -100px;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      bottom: -100px;
      right: -100px;
    }

    body.all-ok .blob-1 {
      background: radial-gradient(circle, rgba(34, 197, 94, 0.08), transparent 70%);
    }

    body.all-ok .blob-2 {
      background: radial-gradient(circle, rgba(34, 197, 94, 0.05), transparent 70%);
    }

    body.danger .blob-1 {
      background: radial-gradient(circle, rgba(239, 68, 68, 0.08), transparent 70%);
    }

    body.danger .blob-2 {
      background: radial-gradient(circle, rgba(239, 68, 68, 0.05), transparent 70%);
    }

    body.pending .blob-1 {
      background: radial-gradient(circle, rgba(245, 158, 11, 0.07), transparent 70%);
    }

    body.pending .blob-2 {
      background: radial-gradient(circle, rgba(245, 158, 11, 0.04), transparent 70%);
    }

    /* layout */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 48px;
      gap: 28px;
    }

    /* connection badge */
    .conn-badge {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      z-index: 50;
      transition: all 0.4s;
    }

    .conn-badge.connected {
      color: var(--green);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .conn-badge.disconnected {
      color: var(--red);
      border-color: rgba(239, 68, 68, 0.25);
    }

    .conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .conn-badge.connected .conn-dot {
      animation: connPulse 2s infinite;
    }

    @keyframes connPulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    /* main banner */
    .banner {
      width: 100%;
      max-width: 600px;
      border-radius: 24px;
      padding: 36px 32px;
      text-align: center;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.6s;
      position: relative;
      overflow: hidden;
    }

    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      opacity: 0;
      transition: opacity 0.6s;
      pointer-events: none;
    }

    .banner.safe {
      border-color: rgba(34, 197, 94, 0.3);
      box-shadow: 0 0 60px rgba(34, 197, 94, 0.07);
    }

    .banner.safe::before {
      background: radial-gradient(ellipse at center, rgba(34, 197, 94, 0.07), transparent 70%);
      opacity: 1;
    }

    .banner.danger {
      border-color: rgba(239, 68, 68, 0.3);
      box-shadow: 0 0 60px rgba(239, 68, 68, 0.07);
    }

    .banner.danger::before {
      background: radial-gradient(ellipse at center, rgba(239, 68, 68, 0.07), transparent 70%);
      opacity: 1;
    }

    .banner.wait {
      border-color: rgba(245, 158, 11, 0.25);
    }

    .banner-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 14px;
      animation: floaty 3s ease-in-out infinite;
    }

    @keyframes floaty {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-8px)
      }
    }

    .banner-title {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .banner-title.safe {
      color: var(--green);
    }

    .banner-title.danger {
      color: var(--red);
    }

    .banner-title.wait {
      color: var(--yellow);
    }

    .banner-sub {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 600;
    }

    /* person cards */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 600px;
    }

    @media (max-width: 500px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }

    .person-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      transition: border-color 0.5s, box-shadow 0.5s;
      position: relative;
      overflow: hidden;
    }

    .person-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    .person-card.ok {
      border-color: rgba(34, 197, 94, 0.25);
    }

    .person-card.ok::before {
      background: radial-gradient(ellipse at top, rgba(34, 197, 94, 0.08), transparent 70%);
      opacity: 1;
    }

    .person-card.off {
      border-color: rgba(239, 68, 68, 0.2);
    }

    .person-card.off::before {
      background: radial-gradient(ellipse at top, rgba(239, 68, 68, 0.07), transparent 70%);
      opacity: 1;
    }

    .person-avatar {
      font-size: 2.8rem;
      margin-bottom: 10px;
      display: block;
    }

    .person-name {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .person-status-text {
      font-size: 0.82rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 20px;
      transition: all 0.5s;
    }

    .person-status-text.ok {
      background: var(--green-dim);
      color: var(--green);
    }

    .person-status-text.off {
      background: var(--red-dim);
      color: var(--red);
    }

    .person-message {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 22px;
      font-weight: 600;
      min-height: 40px;
      transition: all 0.4s;
    }

    /* big toggle button */
    .toggle-btn {
      width: 100%;
      padding: 13px 20px;
      border: none;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.01em;
    }

    .toggle-btn:active {
      transform: scale(0.97);
    }

    .toggle-btn.btn-ok {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: white;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
    }

    .toggle-btn.btn-ok:hover {
      box-shadow: 0 6px 28px rgba(34, 197, 94, 0.45);
    }

    .toggle-btn.btn-off {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .toggle-btn.btn-off:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text);
    }

    /* last updated */
    .meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      justify-content: center;
    }

    /* bottom note */
    .note {
      font-size: 0.73rem;
      color: var(--muted);
      opacity: 0.5;
      text-align: center;
    }

    /* setup screen */
    .setup-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 0;
    }

    .setup-screen.hidden {
      display: none;
    }

    .setup-box {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 36px 32px;
    }

    .setup-box h2 {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .setup-box p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .setup-field {
      margin-bottom: 14px;
    }

    .setup-field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .setup-field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 13px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .setup-field input:focus {
      border-color: rgba(99, 102, 241, 0.5);
    }

    .setup-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .setup-btn:hover {
      opacity: 0.9;
    }

    .setup-steps {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.9;
    }

    .setup-steps a {
      color: #818cf8;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 22px;
      font-size: 0.85rem;
      font-weight: 700;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 300;
      pointer-events: none;
      opacity: 0;
      white-space: nowrap;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>

<body class="pending">

  <!-- ambient blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- connection indicator -->
  <div class="conn-badge" id="connBadge">
    <div class="conn-dot"></div>
    <span id="connText">Connecting...</span>
  </div>


  <!-- Main page -->
  <div class="page" id="mainPage">

    <!-- Status banner -->
    <div class="banner wait" id="banner">
      <span class="banner-icon" id="bannerIcon">⏳</span>
      <div class="banner-title wait" id="bannerTitle">Loading...</div>
      <div class="banner-sub" id="bannerSub">Data aa raha hai...</div>
    </div>

    <!-- Person cards -->
    <div class="cards">

      <!-- Kavana -->
      <div class="person-card" id="kavanaCard">
        <span class="person-avatar">👧</span>
        <div class="person-name">Kavana</div>
        <span class="person-status-text off" id="kavanaStatusBadge">❌ Not OK</span>
        <div class="person-message" id="kavanaMsg">Sis abhi ghar pe hai — call mat karo!</div>
        <button class="toggle-btn btn-off" id="kavanaBtn" onclick="togglePerson('kavana')">
          Tap karo status update karne ke liye
        </button>
        <div class="meta" id="kavanaMeta">—</div>
      </div>

      <!-- Abhinav -->
      <div class="person-card" id="abhinavCard">
        <span class="person-avatar">👦</span>
        <div class="person-name">Abhinav</div>
        <span class="person-status-text off" id="abhinavStatusBadge">❌ Not OK</span>
        <div class="person-message" id="abhinavMsg">Bhai ghar pe hai — call mat karo!</div>
        <button class="toggle-btn btn-off" id="abhinavBtn" onclick="togglePerson('abhinav')">
          Tap karo status update karne ke liye
        </button>
        <div class="meta" id="abhinavMeta">—</div>
      </div>

    </div>

    <div class="note">Dono green ho jao toh call safe hai 📞</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ─── Your Firebase config ────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyBj2s60v3ZfBNeDWUPJp0fHCHqVxfj1K3M",
      authDomain: "test-4f67d.firebaseapp.com",
      databaseURL: "https://test-4f67d-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "test-4f67d",
      storageBucket: "test-4f67d.firebasestorage.app",
      messagingSenderId: "174038039281",
      appId: "1:174038039281:web:17ea3a9b92f11adf094750",
      measurementId: "G-E1911MBDQC"
    };

    // ─── Init Firebase ───────────────────────────────────────
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const connBadge = document.getElementById('connBadge');
    const connText = document.getElementById('connText');

    let state = { kavana: false, abhinav: false };
    let lastTs = { kavana: null, abhinav: null };

    // ─── Connection indicator ────────────────────────────────
    onValue(ref(db, '.info/connected'), snap => {
      const online = snap.val() === true;
      connBadge.className = 'conn-badge ' + (online ? 'connected' : 'disconnected');
      connText.textContent = online ? 'Live sync ✦' : 'Offline';
    });

    // ─── Real-time listener ──────────────────────────────────
    onValue(ref(db, 'status'), snap => {
      const data = snap.val() || {};
      state.kavana = data.kavana?.ok === true;
      state.abhinav = data.abhinav?.ok === true;
      lastTs.kavana = data.kavana?.ts || null;
      lastTs.abhinav = data.abhinav?.ts || null;
      render();
    });

    // ─── Toggle ─────────────────────────────────────────────
    window.togglePerson = function (person) {
      const newVal = !state[person];
      set(ref(db, 'status/' + person), { ok: newVal, ts: Date.now() });
      showToast(person === 'kavana'
        ? (newVal ? '✅ Sis nahi hai — clear!' : '❌ Sis wapas aa gayi')
        : (newVal ? '✅ Bahar hoon — clear!' : '❌ Ghar wapas aa gaya'));
    };

    // ─── Render ─────────────────────────────────────────────
    function render() {
      const kOk = state.kavana;
      const aOk = state.abhinav;
      const allOk = kOk && aOk;
      const none = !kOk && !aOk;

      document.body.className = allOk ? 'all-ok' : (none ? 'danger' : 'pending');

      const banner = document.getElementById('banner');
      const bannerIcon = document.getElementById('bannerIcon');
      const bannerTitle = document.getElementById('bannerTitle');
      const bannerSub = document.getElementById('bannerSub');

      if (allOk) {
        banner.className = 'banner safe';
        bannerIcon.textContent = '📞';
        bannerTitle.className = 'banner-title safe';
        bannerTitle.textContent = 'Call Karo! Safe Hai!';
        bannerSub.textContent = 'Dono clear hain — abhi call karo! ✅';
      } else if (none) {
        banner.className = 'banner danger';
        bannerIcon.textContent = '🚫';
        bannerTitle.className = 'banner-title danger';
        bannerTitle.textContent = 'Danger! Mat Karo Call!';
        bannerSub.textContent = 'Dono ready nahi hain — bilkul mat karo! ❌';
      } else {
        banner.className = 'banner wait';
        bannerIcon.textContent = '⚠️';
        bannerTitle.className = 'banner-title wait';
        bannerTitle.textContent = 'Abhi Nahi...';
        bannerSub.textContent = 'Ek banda abhi ready nahi — thoda wait karo.';
      }

      setCard('kavana',
        kOk ? '✅ Clear!' : '❌ Rukoo',
        kOk ? 'Sis ghar pe nahi hai 🙌' : 'Sis abhi ghar pe hai!',
        kOk ? '✓ Sis is NOT home' : '☝️ Tap when sis leaves',
        lastTs.kavana
      );

      setCard('abhinav',
        aOk ? '✅ Clear!' : '❌ Rukoo',
        aOk ? 'Bhai bahar hai 🚶' : 'Bhai abhi ghar pe hai!',
        aOk ? '✓ I am OUT of house' : '☝️ Tap when you leave',
        lastTs.abhinav
      );
    }

    function setCard(person, badge, msg, btnTxt, ts) {
      const isOk = state[person];
      document.getElementById(person + 'Card').className = 'person-card ' + (isOk ? 'ok' : 'off');
      const b = document.getElementById(person + 'StatusBadge');
      b.className = 'person-status-text ' + (isOk ? 'ok' : 'off');
      b.textContent = badge;
      document.getElementById(person + 'Msg').textContent = msg;
      const btn = document.getElementById(person + 'Btn');
      btn.className = 'toggle-btn ' + (isOk ? 'btn-ok' : 'btn-off');
      btn.textContent = btnTxt;
      document.getElementById(person + 'Meta').textContent = ts ? 'Updated: ' + timeAgo(ts) : '—';
    }

    // ─── Time ago ────────────────────────────────────────────
    function timeAgo(ts) {
      const sec = Math.floor((Date.now() - ts) / 1000);
      if (sec < 10) return 'Abhi abhi';
      if (sec < 60) return sec + 's pehle';
      const min = Math.floor(sec / 60);
      if (min < 60) return min + ' min pehle';
      return Math.floor(min / 60) + ' ghante pehle';
    }
    setInterval(render, 30000); // refresh timestamps every 30s

    // ─── Toast ───────────────────────────────────────────────
    let toastTimer;
    window.showToast = function (msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
    };
  </script>
</body>

</html>
